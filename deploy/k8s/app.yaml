apiVersion: apps/v1
kind: Deployment
metadata:
  name: youthvital
  labels:
    app: youthvital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: youthvital
  template:
    metadata:
      labels:
        app: youthvital
    spec:
      containers:
        - name: youthvital
          image: youthvital:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ENV
              value: production
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: youthvital-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis:6379"
            - name: ARK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: youthvital-secrets
                  key: ark-api-key
                  optional: true
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector:4317"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: youthvital
  labels:
    app: youthvital
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    app: youthvital
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: youthvital
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: youthvital.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: youthvital
                port:
                  number: 8080
