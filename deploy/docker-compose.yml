services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: youthvital-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youthvital
    ports:
      - "5432:5432"
    volumes:
      - youthvital-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d youthvital"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: youthvital-redis
    ports:
      - "6379:6379"
    volumes:
      - youthvital-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  youthvital-postgres-data:
  youthvital-redis-data:
